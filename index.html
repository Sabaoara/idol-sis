<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@500;700;900&family=Noto+Sans+JP:wght@400;500;700&display=swap');

  :root{
    --bg:#14101c; --bg-elev:#ffffff; --card:#ffffff; --card-2:#fafafa;
    --pink:#ed4956; --peri:#5851d5; --gold:#e0a72e; --cyan:#4adede;
    --text:#262626; --text-dim:#8e8e8e; --border:#dbdbdb;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0; height:100%; overflow:auto;}
  body{
    background:
      radial-gradient(ellipse 900px 500px at 20% -10%, rgba(139,143,255,0.18), transparent 60%),
      radial-gradient(ellipse 700px 500px at 90% 0%, rgba(255,92,138,0.14), transparent 60%),
      #14101c;
    color:var(--text); font-family:'Noto Sans JP', sans-serif; height:100dvh;
    display:flex; align-items:center; justify-content:center; padding:24px 16px;
  }
  .display{font-family:'Zen Kaku Gothic New', sans-serif; font-weight:900;}
  #app-root{ width:100%; max-width:400px; height:100%; display:flex; }
  .phone{ background:linear-gradient(180deg, #1c1526, #171020); border:1px solid rgba(245,240,234,0.09); border-radius:34px; padding:10px; box-shadow:0 30px 80px -20px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.02) inset; width:100%; height:100%; display:flex; flex-direction:column; }
  .screen{ background:var(--bg-elev); border-radius:26px; overflow:hidden; flex:1; min-height:700px; display:flex; flex-direction:column; position:relative; }
  .notch{ width:90px; height:22px; background:#0d0913; border-radius:0 0 16px 16px; margin:0 auto; position:relative; z-index:20; flex-shrink:0; }

  @media (max-width:480px){
    body{ padding:0; align-items:stretch; justify-content:stretch; }
    #app-root{ max-width:100%; }
    .phone{ border-radius:0; padding:0; border:none; box-shadow:none; }
    .screen{ border-radius:0; }
    .notch{ display:none; }
  }

  @keyframes shimmer{ 0%{background-position:-150% 0;} 100%{background-position:250% 0;} }
  .foil{ position:relative; overflow:hidden; }
  .foil::after{ content:""; position:absolute; inset:0; background:linear-gradient(115deg, transparent 20%, rgba(255,255,255,0.35) 35%, rgba(255,255,255,0.05) 45%, transparent 60%); background-size:250% 100%; animation:shimmer 3.2s ease-in-out infinite; mix-blend-mode:overlay; pointer-events:none; }

  /* onboarding */
  .onboard{ padding:24px 22px 24px; flex:1; min-height:0; display:flex; flex-direction:column; overflow-y:auto; }
  .eyebrow{ font-size:11px; letter-spacing:0.18em; color:var(--peri); font-weight:700; margin-bottom:6px; }
  .onboard h1{ font-size:23px; margin:0 0 6px; line-height:1.35; }
  .onboard p.sub{ color:var(--text-dim); font-size:12.5px; margin:0 0 16px; line-height:1.6; }
  .field-label{ font-size:12px; color:var(--text-dim); margin:14px 0 7px; font-weight:700; }
  .field-label:first-of-type{margin-top:0;}
  .field-hint{ font-size:11px; color:var(--text-dim); margin:-3px 0 8px; line-height:1.5; }
  input[type="text"], input[type="password"], textarea, select{ width:100%; background:var(--card-2); border:1px solid var(--border); color:var(--text); border-radius:12px; padding:12px 14px; font-family:'Noto Sans JP', sans-serif; font-size:14px; outline:none; transition:border-color .15s; appearance:none; }
  input[type="text"]:focus, input[type="password"]:focus, textarea:focus, select:focus{border-color:var(--peri);}
  textarea{resize:none;}
  select{ background-image:url("data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 20 20'%3E%3Cpath fill='%238e8e8e' d='M5 7l5 5 5-5z'/%3E%3C/svg%3E"); background-repeat:no-repeat; background-position:right 12px center; }

  .pos-grid{ display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .pos-btn, .gender-btn, .filter-swatch{ background:var(--card-2); border:1px solid var(--border); color:var(--text); border-radius:12px; padding:12px 10px; font-family:'Noto Sans JP', sans-serif; font-size:13px; font-weight:500; cursor:pointer; text-align:left; transition:all .15s; }
  .pos-btn:hover, .gender-btn:hover{border-color:var(--peri);}
  .pos-btn.active, .gender-btn.active, .filter-swatch.active{ background:linear-gradient(135deg, rgba(237,73,86,0.12), rgba(88,81,213,0.12)); border-color:var(--pink); }
  .gender-row{ display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .gender-btn{ text-align:center; font-weight:700; }

  .avatar-upload-row{ display:flex; align-items:center; gap:14px; margin-top:4px; }
  .avatar-circle{ width:64px; height:64px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:22px; font-weight:900; color:#fff; background-size:cover; background-position:center; border:2px solid var(--border); }
  .upload-btn{ background:var(--card-2); border:1px solid var(--border); color:var(--text); font-size:12px; font-weight:700; padding:9px 14px; border-radius:100px; cursor:pointer; font-family:'Noto Sans JP'; }
  .upload-btn:hover{border-color:var(--peri);}
  .upload-btn.small{ font-size:11px; padding:6px 11px; }

  .member-block{ padding:10px 0; border-bottom:1px solid var(--border); }
  .member-block .m-top{ display:flex; align-items:center; gap:10px; margin-bottom:8px; }
  .member-block .m-avatar-sm{ width:38px;height:38px;border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:900; color:#fff; background-size:cover; background-position:center; flex-shrink:0; }
  .member-block .m-name-sm{ font-size:12.5px; font-weight:700; flex:1; }
  .member-block select{ width:auto; min-width:110px; font-size:11.5px; padding:8px 24px 8px 8px; flex-shrink:0; }
  .draft-name-input{ flex:1; min-width:0; background:var(--card); border:1px solid var(--border); color:var(--text); border-radius:10px; padding:8px 10px; font-size:12.5px; font-weight:700; font-family:'Noto Sans JP'; outline:none; }
  .draft-name-input:focus{ border-color:var(--peri); }
  .stepper-row{ display:flex; align-items:center; gap:14px; }
  .stepper-btn{ width:36px; height:36px; border-radius:50%; background:var(--card-2); border:1px solid var(--border); color:var(--text); font-size:18px; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; }
  .stepper-btn:hover{ border-color:var(--peri); }
  .stepper-val{ font-family:'Zen Kaku Gothic New'; font-weight:900; font-size:16px; min-width:44px; text-align:center; }
  .goal-type-card.active-goal{ border-color:var(--pink); background:linear-gradient(135deg, rgba(237,73,86,0.08), rgba(88,81,213,0.08)); }
  .member-row-actions{ display:flex; align-items:center; justify-content:space-between; margin-top:8px; }
  .chev-link{ background:none; border:none; color:var(--peri); font-size:11.5px; font-weight:700; cursor:pointer; padding:0; font-family:'Noto Sans JP'; }
  .remove-member-btn{ background:none; border:none; color:var(--pink); font-size:11.5px; font-weight:700; cursor:pointer; padding:0; font-family:'Noto Sans JP'; }
  .photo-strip{ display:flex; gap:7px; overflow-x:auto; padding-bottom:2px; }
  .photo-thumb{ position:relative; width:52px; height:52px; border-radius:10px; background-size:cover; background-position:center; flex-shrink:0; border:1px solid var(--border); }
  .photo-thumb .rm{ position:absolute; top:-5px; right:-5px; width:16px; height:16px; border-radius:50%; background:#ff2d55; color:#fff; font-size:10px; display:flex; align-items:center; justify-content:center; cursor:pointer; border:none; }
  .photo-add-tile{ width:52px; height:52px; border-radius:10px; border:1px dashed var(--border); display:flex; align-items:center; justify-content:center; font-size:18px; color:var(--text-dim); cursor:pointer; flex-shrink:0; }
  .photo-add-tile:hover{ border-color:var(--peri); color:var(--text); }

  .preview-card{ margin-top:18px; border-radius:18px; padding:18px; background:linear-gradient(135deg, var(--pink), var(--peri)); min-height:150px; display:flex; flex-direction:column; justify-content:flex-end; position:relative; }
  .preview-card .badge{ align-self:flex-start; background:rgba(20,16,28,0.55); backdrop-filter:blur(4px); padding:4px 10px; border-radius:100px; font-size:11px; font-weight:700; letter-spacing:0.05em; color:#fff; }
  .preview-card .pname{ font-size:22px; margin-top:auto; text-shadow:0 2px 12px rgba(0,0,0,0.35); color:#fff; }
  .preview-card .pgroup{ font-size:12px; opacity:0.9; font-weight:500; color:#fff; }

  .primary-btn{ margin-top:20px; background:linear-gradient(135deg, var(--pink), #ff8a6a); border:none; color:#fff; font-weight:700; font-size:14px; padding:14px; border-radius:14px; cursor:pointer; font-family:'Noto Sans JP', sans-serif; transition:transform .12s, box-shadow .12s; }
  .primary-btn:hover{transform:translateY(-1px); box-shadow:0 8px 24px -8px rgba(237,73,86,0.45);}
  .primary-btn:disabled{opacity:0.4; cursor:not-allowed; transform:none; box-shadow:none;}
  .primary-btn:active:not(:disabled){transform:translateY(0);}

  /* app shell */
  .topbar{ padding:14px 16px 10px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--border); }
  .topbar-right{ display:flex; align-items:center; gap:12px; }
  .dm-icon-btn{ position:relative; background:none; border:none; font-size:18px; cursor:pointer; padding:0; line-height:1; }
  .dm-badge{ position:absolute; top:-6px; right:-8px; background:var(--pink); color:#fff; font-size:9px; font-weight:800; min-width:15px; height:15px; border-radius:100px; display:flex; align-items:center; justify-content:center; padding:0 3px; }
  .brand{ font-size:15px; letter-spacing:0.12em; display:flex; align-items:center; gap:6px; color:var(--text); }
  .brand .dot{width:7px;height:7px;border-radius:50%;background:var(--pink); box-shadow:0 0 8px rgba(237,73,86,0.5);}
  .follower-chip{ font-size:11px; color:var(--text-dim); display:flex; align-items:center; gap:5px; font-weight:500; }
  .follower-chip b{color:var(--gold); font-weight:700; font-family:'Zen Kaku Gothic New';}

  .profile-header{ padding:12px 16px; display:flex; gap:12px; align-items:center; border-bottom:1px solid var(--border); }
  .avatar{ width:48px;height:48px;border-radius:50%; display:flex;align-items:center;justify-content:center; font-size:18px; font-weight:900; color:#fff; flex-shrink:0; background-size:cover; background-position:center; }
  .profile-header .who{flex:1; min-width:0;}
  .profile-header .name-row{display:flex; align-items:center; gap:6px;}
  .profile-header .name-row .nm{font-size:14px; font-weight:700;}
  .pos-tag{ font-size:10px; padding:2px 7px; border-radius:100px; background:rgba(88,81,213,0.12); color:var(--peri); font-weight:700; white-space:nowrap; }
  .profile-header .grp{font-size:11px; color:var(--text-dim); margin-top:2px;}

  .tabs{ display:flex; border-bottom:1px solid var(--border); }
  .tab{ flex:1; text-align:center; padding:11px 0 9px; font-size:11.5px; font-weight:700; color:var(--text-dim); cursor:pointer; position:relative; border-bottom:2px solid transparent; }
  .tab.active{ color:var(--text); border-bottom-color:var(--pink); }
  .tab .badge-count{ position:absolute; top:5px; right:calc(50% - 24px); background:var(--pink); color:#fff; font-size:9px; font-weight:800; min-width:15px; height:15px; border-radius:100px; display:flex; align-items:center; justify-content:center; padding:0 3px; }

  .feed-scroll{ flex:1; min-height:0; overflow-y:auto; padding:14px 14px 90px; background:var(--bg-elev); }
  .feed-scroll::-webkit-scrollbar{width:0;}

  .action-bar{ display:flex; align-items:center; gap:10px; background:var(--card-2); border:1px solid var(--border); border-radius:100px; padding:9px 14px; margin-bottom:10px; cursor:pointer; color:var(--text-dim); font-size:12.5px; }
  .action-bar.new-post-bar{ margin-bottom:16px; }
  .action-bar .plus{ width:26px; height:26px; border-radius:50%; background:linear-gradient(135deg, var(--pink), var(--peri)); color:#fff; display:flex; align-items:center; justify-content:center; font-size:15px; flex-shrink:0; }
  .action-bar .clock{ width:26px; height:26px; border-radius:50%; background:var(--card); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:13px; flex-shrink:0; }

  .post{ background:var(--card); border:1px solid var(--border); border-radius:14px; margin-bottom:16px; overflow:hidden; animation:pop-in .35s ease; }
  @keyframes pop-in{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);}}
  .post-head{ display:flex; align-items:center; gap:10px; padding:12px 14px; cursor:pointer; }
  .post-avatar{ width:34px;height:34px;border-radius:50%; display:flex;align-items:center;justify-content:center; font-size:13px; font-weight:900; color:#fff; flex-shrink:0; background-size:cover; background-position:center; }
  .post-head .meta{flex:1; min-width:0;}
  .post-head .nm{font-size:13px; font-weight:700; display:flex; align-items:center; gap:6px; color:var(--text);}
  .post-photo{ margin:0; aspect-ratio:1/1; display:flex; align-items:center; justify-content:center; font-size:44px; position:relative; overflow:hidden; }
  .post-photo img{ width:100%; height:100%; object-fit:cover; display:block; }
  .post-photo .cap-in-photo{ position:absolute; bottom:10px; left:12px; right:12px; font-size:11px; font-weight:700; background:rgba(20,16,28,0.5); backdrop-filter:blur(3px); padding:4px 9px; border-radius:100px; display:inline-block; width:fit-content; color:#fff; }

  .post-actions{ display:flex; align-items:center; gap:14px; padding:9px 12px 0; }
  .post-actions .action-icon{ background:none; border:none; padding:0; cursor:pointer; font-size:22px; line-height:1; color:var(--text); font-family:'Noto Sans JP'; }
  .post-actions .action-icon.liked{ color:var(--pink); }
  .post-actions .action-icon.spacer{ margin-left:auto; font-size:19px; }
  .likes-text{ padding:6px 14px 0; font-size:13px; font-weight:700; color:var(--text); }
  .caption-line{ padding:4px 14px 0; font-size:13px; line-height:1.55; color:var(--text); }
  .caption-line b{ margin-right:5px; }
  .caption-line .hashtag{ color:var(--peri); }
  .comment-preview{ padding:3px 14px 0; font-size:12.5px; color:var(--text-dim); }
  .comment-preview:empty{ display:none; }
  .comment-preview b{ color:var(--text); font-weight:700; margin-right:5px; }
  .view-comments-link{ padding:4px 14px 0; font-size:12px; color:var(--text-dim); cursor:pointer; }
  .post-time{ padding:6px 14px 12px; font-size:10px; color:var(--text-dim); letter-spacing:0.02em; }

  .comments{ display:none; padding:6px 14px 4px; flex-direction:column; gap:2px; max-height:280px; overflow-y:auto; }
  .comments.open{ display:flex; }
  .comments::-webkit-scrollbar{ width:4px; }
  .comments::-webkit-scrollbar-thumb{ background:rgba(0,0,0,0.15); border-radius:2px; }
  .comment-block{ padding:5px 0; }
  .comment-block.pinned{ background:rgba(224,167,46,0.1); border-radius:10px; padding:7px 8px; margin-bottom:4px; }
  .comment{ font-size:12px; line-height:1.5; color:var(--text); animation:pop-in .3s ease; }
  .comment.reply{ margin-left:16px; }
  .comment b{color:var(--peri); font-weight:700;}
  .comment.reply b{ color:var(--pink); }
  .comment.ai-tag b::after{ content:" ✨"; }
  .pin-flag{ font-size:9px; color:var(--gold); font-weight:700; margin-bottom:2px; display:block; }
  .comment-actions{ display:flex; gap:12px; margin-top:2px; align-items:center; }
  .comment-actions button{ background:none; border:none; color:var(--text-dim); font-size:10.5px; cursor:pointer; padding:0; font-family:'Noto Sans JP'; }
  .comment-actions button:hover{ color:var(--text); }
  .comment-actions .like-btn.liked{ color:var(--pink); font-weight:700; }
  .reply-box{ display:flex; gap:6px; margin-top:6px; margin-left:0; }
  .reply-box input{ flex:1; background:var(--card-2); border:1px solid var(--border); color:var(--text); border-radius:100px; padding:7px 12px; font-size:12px; font-family:'Noto Sans JP'; outline:none; }
  .reply-box button{ background:var(--pink); border:none; color:#fff; font-weight:700; font-size:11px; padding:0 12px; border-radius:100px; cursor:pointer; }

  .empty-state{ text-align:center; padding:50px 20px; color:var(--text-dim); font-size:13px; line-height:1.7; }
  .empty-state .big{font-size:32px; margin-bottom:10px;}

  .notif-item{ display:flex; gap:10px; align-items:flex-start; padding:12px 2px; border-bottom:1px solid var(--border); }
  .notif-item .n-avatar{ width:32px;height:32px;border-radius:50%; background:var(--card-2); display:flex;align-items:center;justify-content:center; font-size:14px; flex-shrink:0; }
  .notif-item .n-text{font-size:12.5px; line-height:1.6; color:var(--text);}
  .notif-item .n-text b{color:var(--text); font-weight:700;}
  .notif-item .n-time{font-size:10px; color:var(--text-dim); margin-top:2px;}

  .profile-tab{padding:6px 2px;}
  .profile-banner{ height:110px; border-radius:16px; background-size:cover; background-position:center; position:relative; margin-bottom:14px; overflow:hidden; }
  .banner-edit-btn{ position:absolute; top:10px; right:10px; background:rgba(255,255,255,0.9); border:1px solid var(--border); color:var(--text); font-size:11px; font-weight:700; padding:6px 12px; border-radius:100px; cursor:pointer; font-family:'Noto Sans JP'; }
  .profile-top{ display:flex; align-items:center; gap:12px; margin-bottom:4px; }
  .profile-top .avatar-lg{ width:64px;height:64px;border-radius:50%; display:flex;align-items:center;justify-content:center; font-size:24px; font-weight:900; color:#fff; flex-shrink:0; background-size:cover; background-position:center; }
  .change-avatar-btn{ font-size:11px; color:var(--peri); background:none; border:none; cursor:pointer; padding:0; margin-top:4px; font-family:'Noto Sans JP'; font-weight:700; }
  .stat-grid{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin:16px 0 20px; }
  .stat-box{ background:var(--card-2); border:1px solid var(--border); border-radius:14px; padding:14px 8px; text-align:center; }
  .stat-box .v{font-family:'Zen Kaku Gothic New'; font-weight:900; font-size:18px; color:var(--gold);}
  .stat-box .l{font-size:10px; color:var(--text-dim); margin-top:3px;}
  .section-title{font-size:12px; font-weight:700; color:var(--text-dim); margin:18px 0 8px; display:flex; align-items:center; justify-content:space-between;}
  .member-row{ display:flex; align-items:center; gap:10px; padding:9px 0; border-bottom:1px solid var(--border); cursor:pointer; }
  .member-row .m-avatar{ width:36px;height:36px;border-radius:50%; display:flex;align-items:center;justify-content:center; font-size:13px; font-weight:900; color:#fff; flex-shrink:0; background-size:cover; background-position:center; }
  .member-row .m-name{font-size:13px; font-weight:700; color:var(--text);}
  .member-row .m-pos{font-size:11px; color:var(--text-dim);}
  .you-tag{ margin-left:auto; font-size:10px; font-weight:700; color:var(--pink); background:rgba(237,73,86,0.1); padding:3px 8px; border-radius:100px; }
  .chev{ margin-left:auto; color:var(--text-dim); font-size:14px; }
  .edit-profile-btn{ width:100%; background:var(--card-2); border:1px solid var(--border); color:var(--text); font-weight:700; font-size:12.5px; padding:10px; border-radius:100px; cursor:pointer; font-family:'Noto Sans JP'; margin-top:12px; }

  .post-grid{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:3px; margin-top:6px; }
  .grid-tile{ position:relative; aspect-ratio:1/1; overflow:hidden; border-radius:5px; cursor:pointer; background:var(--card-2); }
  .grid-tile img{ width:100%; height:100%; object-fit:cover; display:block; }
  .grid-tile-mood{ width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-size:20px; }
  .pin-badge{ position:absolute; top:4px; left:4px; font-size:12px; filter:drop-shadow(0 1px 2px rgba(0,0,0,0.6)); }
  .pin-profile-btn{ display:block; width:100%; margin-top:14px; background:var(--card-2); border:1px solid var(--border); color:var(--text); font-weight:700; font-size:12.5px; padding:11px; border-radius:100px; cursor:pointer; font-family:'Noto Sans JP'; }

  .bottom-nav{ display:flex; border-top:1px solid var(--border); background:var(--bg-elev); }
  .nav-item{ flex:1; text-align:center; padding:11px 0 13px; cursor:pointer; color:var(--text-dim); font-size:9.5px; font-weight:700; position:relative; }
  .nav-item .ic{ font-size:18px; display:block; margin-bottom:2px; }
  .nav-item.active{color:var(--text);}
  .nav-dot{ position:absolute; top:7px; right:calc(50% - 20px); width:7px; height:7px; border-radius:50%; background:var(--pink); }
  .hint-strip{ text-align:center; font-size:11px; color:var(--text-dim); margin-top:12px; line-height:1.6; }

  function rebuildTeammateDrafts(){

    for(var i=current.length; i<count; i++){

  function fillMissingDraftPositions(){
    var used = state.teammateDrafts.map(function(d){ return d.position; }).filter(Boolean);
    if(state.position) used.push(state.position);
    var pool = ALL_POSITIONS.filter(function(p){ return used.indexOf(p)===-1; });
    state.teammateDrafts.forEach(function(d){
      if(!d.position){ d.position = pool.shift() || ALL_POSITIONS[0]; }
    });

    state.teammateDrafts.forEach(function(d,i){ if(i!==idx && d.position===newPos){ swapIdx=i; } });
    draft.position = newPos;
    if(swapIdx>=0){ state.teammateDrafts[swapIdx].position = oldPos; }

  function requestAIDMReply(conv, name, groupName, position){
    return new Promise(function(resolve){
      try{
        var history = conv.messages.slice(-8).map(function(m){
          return (m.from==='fan' ? 'ファン' : name) + ': ' + m.text;
        }).join('\n');
        var prompt = "あなたはK-POPアイドル「"+name+"」（グループ:"+groupName+"、ポジション:"+position+"）のファン「"+conv.fanName+"」として、DMで会話しています。これまでの会話:\n"+history+
          "\n\nアイドルの直近の返信を踏まえて、ファンとして自然に続く返信を1つだけ、今風のカジュアルな日本語で書いてください（絵文字を適度に含め、40文字程度、ポジティブな内容のみ）。説明文や前置きは不要で、返信本文だけを出力してください。";
        fetch("https://api.anthropic.com/v1/messages", {
          method:"POST",
          headers:{"Content-Type":"application/json"},
          body: JSON.stringify({
            model:"claude-sonnet-4-6",
            max_tokens:150,
            messages:[{ role:"user", content:prompt }]
          })
        }).then(function(r){ return r.json(); })
        .then(function(data){
          var textBlock = (data.content||[]).map(function(b){ return b.text || ''; }).join('\n').trim();
          var cleaned = textBlock.replace(/^["「]|["」]$/g,'').trim();
          resolve(cleaned || null);
        }).catch(function(){ resolve(null); });
      }catch(e){ resolve(null); }
    });
  }

  function sendDM(convId){
    var conv = findDM(convId);
    if(!conv) return;
    var input = document.getElementById('dm-input-'+convId);
    var text = input ? input.value.trim() : '';
    if(!text) return;
    var myMsg = { from:'me', text:text, time:nowLabel() };
    conv.messages.push(myMsg);
    appendDMMessage(convId, myMsg);
    if(input){ input.value=''; }

    var wrap = document.getElementById('dm-thread-'+convId);
    if(wrap){
      wrap.insertAdjacentHTML('beforeend', '<div class="dm-typing" id="dm-typing-'+convId+'">'+esc(conv.fanName)+'が入力中…</div>');
      wrap.scrollTop = wrap.scrollHeight;
    }

    var stageForFallback = conv.turn || 0;
    conv.turn = stageForFallback + 1;

    requestAIDMReply(conv, state.name, state.groupName, state.position).then(function(replyText){
      var final = (replyText || pickFallbackDMReply(stageForFallback)).replace(/\{name\}/g, state.name);
      var fanMsg = { from:'fan', text:final, time:nowLabel() };
      conv.messages.push(fanMsg);
      appendDMMessage(convId, fanMsg);
    });
  }

  function isDataUrl(str){ return typeof str==='string' && str.indexOf('data:image')===0; }

  // Resize + compress an uploaded image client-side before it's used/stored, to keep Storage usage low.
  function compressImageFile(file, maxDim, quality){
    maxDim = maxDim || 1280;
    quality = quality || 0.75;
    return new Promise(function(resolve){
      var reader = new FileReader();
      reader.onload = function(e){
        var img = new Image();
        img.onload = function(){
          try{
            var w = img.width, h = img.height;
            var scale = Math.min(1, maxDim / Math.max(w, h));
            var cw = Math.max(1, Math.round(w*scale)), ch = Math.max(1, Math.round(h*scale));
            var canvas = document.createElement('canvas');
            canvas.width = cw; canvas.height = ch;
            var ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, cw, ch);
            resolve(canvas.toDataURL('image/jpeg', quality));
          }catch(err){ resolve(e.target.result); }
        };
        img.onerror = function(){ resolve(e.target.result); };
        img.src = e.target.result;
      };
      reader.onerror = function(){ resolve(null); };
      reader.readAsDataURL(file);
    });
  }

  function uploadIfNeeded(dataUrl, pathHint){
    if(!isDataUrl(dataUrl)) return Promise.resolve(dataUrl);
    try{
      var ref = fbStorage.ref().child('users/'+state.uid+'/'+pathHint+'_'+Date.now()+'.jpg');
      return ref.putString(dataUrl, 'data_url').then(function(snap){ return snap.ref.getDownloadURL(); }).catch(function(){ return null; });
    }catch(e){ return Promise.resolve(null); }
  }

  function saveState(){
    if(!state.uid) return;
    try{
      var snapshot = {};
      PERSIST_FIELDS.forEach(function(k){ snapshot[k] = state[k]; });
      if(Array.isArray(snapshot.posts) && snapshot.posts.length>60){ snapshot.posts = snapshot.posts.slice(0,60); }
      if(Array.isArray(snapshot.notifications) && snapshot.notifications.length>100){ snapshot.notifications = snapshot.notifications.slice(0,100); }

      var uploadTasks = [];

      if(isDataUrl(snapshot.avatarDataUrl)){
        uploadTasks.push(uploadIfNeeded(snapshot.avatarDataUrl, 'avatar').then(function(url){
          if(url){ snapshot.avatarDataUrl = url; state.avatarDataUrl = url; }
        }));
      }
      if(isDataUrl(snapshot.backgroundDataUrl)){
        uploadTasks.push(uploadIfNeeded(snapshot.backgroundDataUrl, 'background').then(function(url){
          if(url){ snapshot.backgroundDataUrl = url; state.backgroundDataUrl = url; }
        }));
      }
      (snapshot.members||[]).forEach(function(m, mi){
        if(isDataUrl(m.avatarDataUrl)){
          uploadTasks.push(uploadIfNeeded(m.avatarDataUrl, 'member_'+mi+'_avatar').then(function(url){
            if(url){ m.avatarDataUrl = url; if(state.members[mi]) state.members[mi].avatarDataUrl = url; }
          }));
        }
        (m.photos||[]).forEach(function(photoUrl, pi){
          if(isDataUrl(photoUrl)){
            uploadTasks.push(uploadIfNeeded(photoUrl, 'member_'+mi+'_photo_'+pi).then(function(url){
              if(url){
                m.photos[pi] = url;
                if(state.members[mi] && state.members[mi].photos){ state.members[mi].photos[pi] = url; }
              }
            }));
          }
        });
      });
      (snapshot.posts||[]).forEach(function(p, pi){
        if(p.photo && p.photo.type==='upload' && isDataUrl(p.photo.dataUrl)){
          uploadTasks.push(uploadIfNeeded(p.photo.dataUrl, 'post_'+pi).then(function(url){
            if(url){
              p.photo.dataUrl = url;
              var live = findPost(p.id);
              if(live && live.photo){ live.photo.dataUrl = url; }
            }
          }));
        }
        if(isDataUrl(p.avatarDataUrl)){
          uploadTasks.push(uploadIfNeeded(p.avatarDataUrl, 'post_avatar_'+pi).then(function(url){
            if(url){
              p.avatarDataUrl = url;
              var live = findPost(p.id);
              if(live){ live.avatarDataUrl = url; }
            }
          }));
        }
      });

      Promise.all(uploadTasks).then(function(){
        fbDb.collection('users').doc(state.uid).set(snapshot).catch(function(){ /* fail silently */ });
      });
    }catch(e){ /* fail silently, app still works this session */ }
  }

  function idToEmail(id){ return id.trim().toLowerCase()+'@orbit.local'; }

  function bindLoginScreen(){
    var idInput = document.getElementById('auth-id');
    var pwInput = document.getElementById('auth-pw');
    var signupBtn = document.getElementById('btn-signup');
    var loginBtn = document.getElementById('btn-login');
    if(!signupBtn || !loginBtn) return;

    signupBtn.addEventListener('click', function(){
      var id = (idInput.value||'').trim();
      var pw = pwInput.value||'';
      if(!/^[a-zA-Z0-9_]{3,20}$/.test(id)){ alert('IDは半角英数字と_（アンダースコア）で3〜20文字にしてください。'); return; }
      if(pw.length<6){ alert('パスワードは6文字以上にしてください。'); return; }
      fbAuth.createUserWithEmailAndPassword(idToEmail(id), pw).then(function(cred){
        return cred.user.updateProfile({displayName:id});
      }).catch(function(err){
        if(err.code==='auth/email-already-in-use'){ alert('このIDは既に使われています。別のIDにするか、「ログイン」をお試しください。'); }
        else if(err.code==='auth/weak-password'){ alert('パスワードは6文字以上にしてください。'); }
        else { alert('登録に失敗しました。\n'+(err && err.message ? err.message : '')); }
      });
    });

    loginBtn.addEventListener('click', function(){
      var id = (idInput.value||'').trim();
      var pw = pwInput.value||'';
      if(!id || !pw){ alert('IDとパスワードを入力してください。'); return; }
      fbAuth.signInWithEmailAndPassword(idToEmail(id), pw).catch(function(err){
        if(err.code==='auth/wrong-password' || err.code==='auth/user-not-found' || err.code==='auth/invalid-credential'){
          alert('IDまたはパスワードが間違っています。まだ登録していない場合は「新規登録してはじめる」を使ってください。');
        } else {
          alert('ログインに失敗しました。\n'+(err && err.message ? err.message : ''));
        }
      });
    });
  }

      btn.addEventListener('click', function(){

        render();
      });
    });

    document.getElementById('btn-group-minus').addEventListener('click', function(){
      if(state.groupSize>1){ state.groupSize--; rebuildTeammateDrafts(); render(); }
    });
    document.getElementById('btn-group-plus').addEventListener('click', function(){
      if(state.groupSize < ALL_POSITIONS.length){ state.groupSize++; rebuildTeammateDrafts(); render(); }
    });

    document.querySelectorAll('.pos-btn').forEach(function(btn){
      btn.addEventListener('click', function(){
        onPlayerPositionChange(btn.getAttribute('data-pos'));
        render();
      });
    });

    document.querySelectorAll('[data-draft-name]').forEach(function(input){
      input.addEventListener('input', function(e){
        var idx = parseInt(input.getAttribute('data-draft-name'),10);
        state.teammateDrafts[idx].name = e.target.value;
      });
    });

    document.querySelectorAll('[data-draft-pos]').forEach(function(sel){
      sel.addEventListener('change', function(){
        var idx = parseInt(sel.getAttribute('data-draft-pos'),10);
        onTeammateDraftPositionChange(idx, sel.value);
        render();
      });
    });

    document.querySelectorAll('[data-draft-add-photo]').forEach(function(tile){
      tile.addEventListener('click', function(){
        var idx = tile.getAttribute('data-draft-add-photo');
        document.getElementById('draft-file-'+idx).click();
      });
    });
    state.teammateDrafts.forEach(function(d, idx){
      var fileEl = document.getElementById('draft-file-'+idx);
      if(!fileEl) return;
      fileEl.addEventListener('change', function(e){
        var file = e.target.files && e.target.files[0];
        if(!file) return;
        compressImageFile(file).then(function(dataUrl){
          if(dataUrl){ d.photos.push(dataUrl); render(); }
        });
      });
    });
    document.querySelectorAll('[data-draft-rm-photo]').forEach(function(btn){
      btn.addEventListener('click', function(){
        var idx = parseInt(btn.getAttribute('data-draft-rm-photo'),10);
        var pIdx = parseInt(btn.getAttribute('data-draft-rm-idx'),10);
        state.teammateDrafts[idx].photos.splice(pIdx,1);
        render();
      });
    });

    document.querySelectorAll('[data-pending-goal]').forEach(function(card){
      card.addEventListener('click', function(){
        var id = card.getAttribute('data-pending-goal');
        state.pendingGoalType = state.pendingGoalType===id ? null : id;
        render();
      });
    });

    var avatarPickBtn = document.getElementById('btn-avatar-pick');
    var avatarFile = document.getElementById('file-avatar');
    avatarPickBtn.addEventListener('click', function(){ avatarFile.click(); });
    avatarFile.addEventListener('change', function(e){
      var file = e.target.files && e.target.files[0];
      if(!file) return;
      compressImageFile(file).then(function(dataUrl){
        if(!dataUrl) return;
        state.avatarDataUrl = dataUrl;
        var ap = document.getElementById('avatar-preview-circle');
        if(ap){ ap.style.background = 'url('+state.avatarDataUrl+') center/cover'; ap.textContent=''; }
      });
    });

    var startBtn = document.getElementById('btn-start');
    startBtn.addEventListener('click', function(){
      if(startBtn.disabled) return;
      state.members = buildMembersFromDrafts();
      state.screen = 'app';
      state.sessionStartFollowers = state.followers;
      if(state.pendingGoalType){ startGoal(state.pendingGoalType); }
      state.notifications.unshift({ icon:'🎉', time:nowLabel(), html: '<b>ORBIT</b>へようこそ！さっそく最初の投稿をしてみましょう' });
      render();
    });
  }

  /* ================= APP SHELL ================= */

    else if(state.activeTab==='live') tabBody = renderLiveTab();
    else if(state.activeTab==='notif') tabBody = renderNotifTab();

    return ''+
    '<div class="phone"><div class="notch"></div><div class="screen" id="screen-root">'+
      '<div class="topbar">'+
        '<div class="brand display"><span class="dot"></span>ORBIT</div>'+
        '<div class="topbar-right">'+
          '<button class="dm-icon-btn" id="btn-open-dms">✉️<span class="dm-badge" id="dm-badge" style="display:'+(unreadDMCount()>0?'flex':'none')+';">'+unreadDMCount()+'</span></button>'+
          '<div class="follower-chip">フォロワー <b id="follower-count">'+fmtFollowers(state.followers)+'</b></div>'+
        '</div>'+
      '</div>'+
      '<div class="profile-header">'+
        '<div class="avatar" style="'+avatarStyleStr+'">'+(state.avatarDataUrl?'':esc(initials(state.name)))+'</div>'+
        '<div class="who">'+
          '<div class="name-row"><span class="nm">'+esc(state.name)+'</span><span class="pos-tag">'+esc(state.position)+'</span></div>'+
          '<div class="grp">'+esc(state.groupName)+' · '+genderLabel()+' · '+debutLabel()+'</div>'+
        '</div>'+
      '</div>'+

        navBtn('feed','📱','フィード')+ navBtn('live','🎥','配信')+ navBtn('notif','🔔','通知', state.unreadNotif)+ navBtn('profile','👤','プロフィール')+
      '</div>'+
      (state.composerOpen ? renderComposerOverlay() : '')+
      (state.viewingMemberName ? renderMemberProfileOverlay() : '')+
      (state.viewingPostId ? renderPostDetailOverlay() : '')+

      (state.settingGoal ? renderGoalSetOverlay() : '')+

    '</div></div>';

  function tabBtn(id,label,count){
    var badge = count ? '<span class="badge-count">'+count+'</span>' : '';
    return '<div class="tab'+(state.activeTab===id?' active':'')+'" data-tab="'+id+'">'+label+badge+'</div>';
  }
  function navBtn(id,icon,label,count){
    var dot = count ? '<span class="nav-dot"></span>' : '';
    return '<div class="nav-item'+(state.activeTab===id?' active':'')+'" data-tab="'+id+'">'+dot+'<span class="ic">'+icon+'</span>'+label+'</div>';
  }

  /* ---------------- FEED TAB ---------------- */
  function renderFeedTab(){
    var advanceBar = '<div class="action-bar" id="btn-advance"><span class="clock">⏱</span>時間を進める（メンバーやファンの動きを見る）</div>';
    var newPostBar = '<div class="action-bar new-post-bar" id="btn-open-composer"><span class="plus">＋</span>新しい投稿を作成</div>';
    var postsHtml;
    if(state.posts.length===0){
      postsHtml = '<div class="empty-state"><div class="big">🌙</div>投稿はまだありません。<br>最初の投稿でファンにあいさつしよう！</div>';
    } else {
      postsHtml = state.posts.map(renderPost).join('');
    }
    return advanceBar + newPostBar + postsHtml;
  }

  function renderPhotoBlock(photo, filter){
    var filterCss = filter && filter!=='none' ? (FILTERS.filter(function(f){return f.id===filter;})[0]||{}).css : null;
    if(photo.type==='upload'){
      return '<div class="post-photo"><img src="'+photo.dataUrl+'" alt=""'+(filterCss?' style="filter:'+filterCss+'"':'')+'></div>';
    }
    var moodDef = MOODS.filter(function(m){return m.id===photo.moodId;})[0] || MOODS[0];
    return '<div class="post-photo foil" style="background:'+moodDef.grad+'">'+moodDef.emoji+'<span class="cap-in-photo">'+moodDef.label+'</span></div>';
  }

  function renderCommentBlock(post, comment){
    var isPinned = post.pinnedCommentId === comment.id;
    var mgmtActions = post.isMine ? (
      '<button data-action="pin" data-post="'+post.id+'" data-comment="'+comment.id+'">'+(isPinned?'固定を解除':'📌固定')+'</button>'+
      '<button data-action="reply" data-post="'+post.id+'" data-comment="'+comment.id+'">💬返信</button>'+
      '<button data-action="delete" data-post="'+post.id+'" data-comment="'+comment.id+'">🗑削除</button>'
    ) : '';
    var likeBtn = '<button class="like-btn'+(comment.liked?' liked':'')+'" data-action="like-comment" data-post="'+post.id+'" data-comment="'+comment.id+'">'+(comment.liked?'♥':'♡')+' '+(comment.likes||0)+'</button>';
    var replyBox = state.replyOpenCommentId===comment.id ? (
      '<div class="reply-box">'+
        '<input type="text" id="reply-input-'+comment.id+'" placeholder="返信を書く…" value="'+esc(state.replyDraft)+'" maxlength="60">'+
        '<button data-action="send-reply" data-post="'+post.id+'" data-comment="'+comment.id+'">送信</button>'+
      '</div>'
    ) : '';
    return '<div class="comment-block'+(isPinned?' pinned':'')+'">'+
      (isPinned?'<span class="pin-flag">📌 固定されたコメント</span>':'')+
      '<div class="comment'+(comment.ai?' ai-tag':'')+(comment.isReply?' reply':'')+'"><b>'+esc(comment.user)+'</b> '+esc(comment.text)+'</div>'+
      '<div class="comment-actions">'+likeBtn+mgmtActions+'</div>'+
      replyBox +
    '</div>';
  }

  function renderPost(post, opts){
    opts = opts || {};
    var avatarStyleStr = post.avatarDataUrl ? avatarStyle(post.avatarDataUrl, post.color) : 'background:'+post.color;
    var ordered = post.comments.slice();
    if(post.pinnedCommentId){
      ordered.sort(function(a,b){
        if(a.id===post.pinnedCommentId) return -1;
        if(b.id===post.pinnedCommentId) return 1;
        return 0;
      });
    }
    var commentsHtml = ordered.map(function(c){ return renderCommentBlock(post, c); }).join('');
    var clickAttr = post.isMine ? '' : ' data-open-member="'+esc(post.name)+'"';
    var pinBtn = post.isMine ? ('<button class="pin-profile-btn" data-action="pin-profile" data-post="'+post.id+'">'+(post.pinnedToProfile?'📌 プロフィール固定を解除':'📌 プロフィールに固定')+'</button>') : '';

    var expanded = !!opts.expanded || !!post._commentsExpanded;
    var previewComment = ordered[0];
    var previewHtml = previewComment ? ('<div class="comment-preview" id="cprev-'+post.id+'"><b>'+esc(previewComment.user)+'</b>'+esc(previewComment.text)+'</div>') : '<div class="comment-preview" id="cprev-'+post.id+'"></div>';
    var toggleLabel = post.comments.length>1 ? ('コメント'+post.comments.length+'件をすべて見る') : (post.comments.length===1 ? '' : '');
    var toggleHtml = toggleLabel ? '<div class="view-comments-link" data-action="toggle-comments" data-post="'+post.id+'" id="ctoggle-'+post.id+'">'+toggleLabel+'</div>' : '<div class="view-comments-link" data-action="toggle-comments" data-post="'+post.id+'" id="ctoggle-'+post.id+'" style="display:none;"></div>';

    return ''+
    '<div class="post" data-post-id="'+post.id+'">'+
      '<div class="post-head"'+clickAttr+'>'+
        '<div class="post-avatar" style="'+avatarStyleStr+'">'+(post.avatarDataUrl?'':esc(initials(post.name)))+'</div>'+
        '<div class="meta">'+
          '<div class="nm">'+esc(post.name)+' <span class="pos-tag">'+esc(post.position)+'</span></div>'+
        '</div>'+
      '</div>'+
      renderPhotoBlock(post.photo, post.filter)+
      '<div class="post-actions">'+
        '<button class="action-icon like-icon'+(post.liked?' liked':'')+'" data-action="toggle-post-like" data-post="'+post.id+'">'+(post.liked?'♥':'♡')+'</button>'+
        '<button class="action-icon" data-action="toggle-comments" data-post="'+post.id+'">💬</button>'+
        '<button class="action-icon" disabled style="opacity:0.55; cursor:default;">➤</button>'+
        '<button class="action-icon spacer'+(post.saved?' liked':'')+'" data-action="toggle-save" data-post="'+post.id+'">'+(post.saved?'🔖':'📑')+'</button>'+
      '</div>'+
      '<div class="likes-text" id="likes-'+post.id+'">'+post.likes.toLocaleString()+'件のいいね</div>'+
      '<div class="caption-line"><b>'+esc(post.name)+'</b><span id="caption-'+post.id+'">'+linkifyCaption(post.caption)+'</span></div>'+
      previewHtml+
      toggleHtml+
      '<div class="comments'+(expanded?' open':'')+'" id="comments-'+post.id+'">'+commentsHtml+'</div>'+
      '<div class="post-time">'+esc(post.time)+'</div>'+
      pinBtn+
    '</div>';
  }

  function toggleCommentsOpen(post){
    post._commentsExpanded = !post._commentsExpanded;
    render();
  }

  /* ---------------- NOTIF TAB ---------------- */
  function renderNotifTab(){
    if(state.notifications.length===0){ return '<div class="empty-state"><div class="big">🔔</div>通知はまだありません。</div>'; }
    return state.notifications.map(function(n){
      return '<div class="notif-item"><div class="n-avatar">'+n.icon+'</div><div><div class="n-text">'+n.html+'</div><div class="n-time">'+n.time+'</div></div></div>';
    }).join('');
  }

  /* ---------------- GRID HELPERS ---------------- */
  function renderPostGridTile(post){
    var inner;
    if(post.photo.type==='upload'){ inner = '<img src="'+post.photo.dataUrl+'" alt="">'; }
    else { var m = MOODS.filter(function(x){return x.id===post.photo.moodId;})[0]||MOODS[0]; inner = '<div class="grid-tile-mood" style="background:'+m.grad+'">'+m.emoji+'</div>'; }
    var pinBadge = post.pinnedToProfile ? '<span class="pin-badge">📌</span>' : '';
    return '<div class="grid-tile" data-view-post="'+post.id+'">'+pinBadge+inner+'</div>';
  }
  function renderPostGrid(posts){
    if(posts.length===0){ return '<div class="empty-state" style="padding:24px 10px;"><div class="big">📷</div>まだ投稿がありません</div>'; }
    var pinned = posts.filter(function(p){ return p.pinnedToProfile; }).sort(function(a,b){ return (b.pinnedAt||0)-(a.pinnedAt||0); });
    var rest = posts.filter(function(p){ return !p.pinnedToProfile; });
    var ordered = pinned.concat(rest);
    return '<div class="post-grid">'+ordered.map(renderPostGridTile).join('')+'</div>';
  }

  /* ---------------- PROFILE TAB ---------------- */
  function renderProfileTab(){
    var myPosts = state.posts.filter(function(p){ return p.isMine; });
    var totalLikes = state.posts.reduce(function(sum,p){return sum+p.likes;},0);
    var youAvatarStyleStr = avatarStyle(state.avatarDataUrl, AVATAR_COLORS[0]);
    var bannerStyle = state.backgroundDataUrl
      ? 'background-image:url('+state.backgroundDataUrl+')'
      : 'background:linear-gradient(135deg,'+AVATAR_COLORS[1]+','+AVATAR_COLORS[0]+')';

    var membersHtml = state.members.map(function(m, idx){
      var thumbs = m.photos.map(function(url, pIdx){
        return '<div class="photo-thumb" style="background-image:url('+url+')"><button type="button" class="rm" data-prm-member="'+idx+'" data-prm-idx="'+pIdx+'">×</button></div>';
      }).join('');
      var posOptions = ALL_POSITIONS.filter(function(p){ return p!==state.position; }).map(function(p){
        return '<option value="'+esc(p)+'"'+(m.position===p?' selected':'')+'>'+esc(p)+'</option>';
      }).join('');
      return '<div class="member-block">'+
        '<div class="m-top">'+
          '<div class="m-avatar-sm" data-open-member="'+esc(m.name)+'" style="cursor:pointer; '+(m.avatarDataUrl?avatarStyle(m.avatarDataUrl,m.color):'background:'+m.color)+'">'+(m.avatarDataUrl?'':esc(initials(m.name)))+'</div>'+
          '<input type="text" class="draft-name-input" data-member-name="'+idx+'" value="'+esc(m.name)+'" maxlength="10">'+
          '<select data-member-pos="'+idx+'">'+posOptions+'</select>'+
        '</div>'+
        '<div class="photo-strip">'+thumbs+'<div class="photo-add-tile" data-padd-member="'+idx+'">＋</div></div>'+
        '<input type="file" id="pfile-'+idx+'" accept="image/*">'+
        '<div class="member-row-actions">'+
          '<button type="button" class="chev-link" data-open-member="'+esc(m.name)+'">投稿を見る ›</button>'+
          '<button type="button" class="remove-member-btn" data-remove-member="'+idx+'">－ このメンバーを削除</button>'+
        '</div>'+
      '</div>';
    }).join('');
    var addMemberBtn = state.members.length < ALL_POSITIONS.length-1
      ? '<button type="button" class="edit-profile-btn" id="btn-add-member" style="margin-top:10px;">＋ メンバーを追加</button>'
      : '';

    return ''+
    '<div class="profile-tab">'+
      '<div class="profile-banner" style="'+bannerStyle+'"><button class="banner-edit-btn" id="btn-edit-profile">✏️ プロフィールを編集</button></div>'+
      '<div class="profile-top">'+
        '<div class="avatar-lg" id="profile-avatar-lg" style="'+youAvatarStyleStr+'">'+(state.avatarDataUrl?'':esc(initials(state.name)))+'</div>'+
        '<div>'+
          '<div style="font-weight:700; font-size:15px;">'+esc(state.name)+'</div>'+
          '<div style="font-size:11px; color:var(--text-dim);">'+esc(state.groupName)+' · '+esc(state.position)+'</div>'+
          (state.bio ? '<div style="font-size:11.5px; color:var(--text); margin-top:3px;">'+esc(state.bio)+'</div>' : '')+
        '</div>'+
      '</div>'+
      '<div class="stat-grid">'+
        '<div class="stat-box"><div class="v">'+fmtFollowers(state.followers)+'</div><div class="l">フォロワー</div></div>'+
        '<div class="stat-box"><div class="v">'+state.posts.length+'</div><div class="l">投稿数</div></div>'+
        '<div class="stat-box"><div class="v">'+totalLikes+'</div><div class="l">総いいね</div></div>'+
      '</div>'+
      '<button class="edit-profile-btn" id="btn-view-stats" style="margin-top:0;">📊 統計・人気投稿ランキングを見る</button>'+
      '<div class="section-title">殿堂ランク</div>'+
      renderAwardTierCard()+
      '<div class="section-title">今の目標</div>'+
      renderGoalCard()+
      '<div class="section-title">あなたの投稿</div>'+
      renderPostGrid(myPosts)+
      '<div class="section-title" style="margin-top:22px;">'+esc(state.groupName)+'（'+genderLabel()+'・'+debutLabel()+'）メンバー</div>'+
      '<div class="field-hint">メンバー名や担当ポジションもここで編集できます。アイコンをタップすると投稿一覧が見られます</div>'+
      membersHtml +
      addMemberBtn +
    '</div>';
  }

  /* ---------------- GOAL CARD & OVERLAY ---------------- */
  function renderGoalCard(){
    if(!state.goal){
      return '<div class="goal-card">'+
        '<div class="goal-empty">🎯 まだ目標が設定されていません。カムバックや授賞式に向けてフォロワーを伸ばそう！</div>'+
        '<button class="edit-profile-btn" id="btn-set-goal" style="margin-top:10px;">目標を設定する</button>'+
      '</div>';
    }
    var g = state.goal;
    var pct = goalProgressPercent();
    var achieved = state.followers >= g.targetFollowers;
    var daysLeft = goalDaysLeft();
    var expired = !achieved && daysLeft<=0;
    var countdownBadge = (!achieved && !expired) ? ('<span class="goal-countdown">⏳ 残り'+daysLeft+'日</span>') : '';

    var statusHtml;
    if(achieved){
      statusHtml = '<div class="goal-achieved">🎉 目標達成！</div>'+
        (g.claimedReward
          ? '<div class="field-hint" style="margin:6px 0 0;">報酬「'+esc(g.rewardLabel)+'」を受け取り済みです</div>'
          : '<button class="edit-profile-btn" id="btn-claim-goal" style="margin-top:10px;">🎁 報酬を受け取る（'+esc(g.rewardLabel)+'）</button>');
    } else if(expired){
      statusHtml = '<div class="field-hint">期限が過ぎました（ペナルティはありません）</div>'+
        '<button class="edit-profile-btn" id="btn-set-goal" style="margin-top:10px;">新しい目標を設定する</button>';
    } else {
      statusHtml = '<div class="field-hint">目標 '+fmtFollowers(g.targetFollowers)+'人まで あと'+fmtFollowers(Math.max(0,g.targetFollowers-state.followers))+'人</div>'+
        '<button class="change-avatar-btn" id="btn-set-goal" style="margin-top:8px;">目標を変更する</button>';
    }

    return '<div class="goal-card">'+
      '<div class="goal-title-row"><div class="goal-title">'+g.emoji+' '+esc(g.label)+'</div>'+countdownBadge+'</div>'+
      '<div class="goal-bar-track"><div class="goal-bar-fill" style="width:'+pct.toFixed(1)+'%;"></div></div>'+
      '<div class="goal-nums"><span>'+fmtFollowers(state.followers)+'人</span><span>'+fmtFollowers(g.targetFollowers)+'人</span></div>'+
      statusHtml+
    '</div>';
  }

  function renderGoalSetOverlay(){
    var cards = GOAL_TYPES.map(function(g){
      var target = Math.round(state.followers * g.multiplier);
      return '<div class="goal-type-card" data-goal-type="'+g.id+'">'+
        '<div class="goal-title">'+g.emoji+' '+esc(g.label)+'</div>'+
        '<div class="field-hint" style="margin:4px 0 0;">期間: '+g.days+'日 · 目標フォロワー: '+fmtFollowers(target)+'人</div>'+
        '<div class="field-hint" style="margin:2px 0 0;">達成報酬: '+esc(g.rewardLabel)+'</div>'+
      '</div>';
    }).join('');
    return ''+
    '<div class="composer-overlay layer4">'+
      '<div class="overlay-topbar">'+
        '<button class="ot-btn" id="btn-goal-close">キャンセル</button>'+
        '<div class="ot-title">目標を設定</div>'+
        '<div style="width:52px;"></div>'+
      '</div>'+
      '<div class="overlay-body">'+
        '<div class="pick-hint">期限までにフォロワーを伸ばそう。達成できなくてもペナルティはありません。</div>'+
        cards+
      '</div>'+
    '</div>';
  }

  /* ---------------- STATS OVERLAY ---------------- */
  function renderStatsOverlay(){
    var todayGrowth = state.followers - state.sessionStartFollowers;
    var ranked = state.posts.slice().sort(function(a,b){ return b.likes-a.likes; }).slice(0,8);
    var rankHtml = ranked.map(function(p, idx){
      var avStyle = p.avatarDataUrl ? avatarStyle(p.avatarDataUrl,p.color) : 'background:'+p.color;
      return '<div class="rank-row" data-view-post="'+p.id+'">'+
        '<div class="rank-num">'+(idx+1)+'</div>'+
        '<div class="m-avatar" style="'+avStyle+'">'+(p.avatarDataUrl?'':esc(initials(p.name)))+'</div>'+
        '<div class="rank-mid"><div class="rank-name">'+esc(p.name)+'</div><div class="rank-caption">'+esc((p.caption||'').slice(0,20))+'</div></div>'+
        '<div class="rank-likes">♥ '+p.likes+'</div>'+
      '</div>';
    }).join('');
    return ''+

      '<div class="live-comments-scroll" id="live-comments-scroll">'+commentLines+'</div>'+

  /* ---------------- bind app events ---------------- */
  function bindApp(){
    document.querySelectorAll('[data-tab]').forEach(function(el){
      el.addEventListener('click', function(){
        state.activeTab = el.getAttribute('data-tab');
        if(state.activeTab==='notif'){ state.unreadNotif = 0; }
        render();
      });
    });

    if(state.activeTab==='feed' && !state.composerOpen){
      var openBtn = document.getElementById('btn-open-composer');
      if(openBtn) openBtn.addEventListener('click', function(){
        state.composerOpen = true; state.composerStep='pick'; state.composerImage=null; state.composerText=''; state.composerFilter='none';
        render();
      });
      var advBtn = document.getElementById('btn-advance');
      if(advBtn) advBtn.addEventListener('click', advanceTime);
    }

    document.querySelectorAll('[data-action]').forEach(function(btn){
      btn.addEventListener('click', function(){ handleCommentAction(btn); });
    });

    document.querySelectorAll('[data-open-member]').forEach(function(el){
      el.addEventListener('click', function(){
        state.viewingMemberName = el.getAttribute('data-open-member');
        render();
      });
    });

    document.querySelectorAll('[data-view-post]').forEach(function(el){
      el.addEventListener('click', function(){
        state.viewingPostId = el.getAttribute('data-view-post');
        render();
      });
    });

    if(state.activeTab==='profile'){
      var editBtn = document.getElementById('btn-edit-profile');
      if(editBtn) editBtn.addEventListener('click', function(){ state.editingProfile = true; render(); });

      var statsBtn = document.getElementById('btn-view-stats');
      if(statsBtn) statsBtn.addEventListener('click', function(){ state.viewingStats = true; render(); });

      var setGoalBtn = document.getElementById('btn-set-goal');
      if(setGoalBtn) setGoalBtn.addEventListener('click', function(){ state.settingGoal = true; render(); });

      var claimBtn = document.getElementById('btn-claim-goal');
      if(claimBtn) claimBtn.addEventListener('click', function(){ state.goal.claimedReward = true; render(); });

      document.querySelectorAll('[data-padd-member]').forEach(function(tile){
        tile.addEventListener('click', function(e){
          e.stopPropagation();
          var idx = tile.getAttribute('data-padd-member');
          document.getElementById('pfile-'+idx).click();
        });
      });
      state.members.forEach(function(m, idx){
        var fileEl = document.getElementById('pfile-'+idx);
        if(!fileEl) return;
        fileEl.addEventListener('change', function(e){
          var file = e.target.files && e.target.files[0];
          if(!file) return;
          compressImageFile(file).then(function(dataUrl){
            if(!dataUrl) return;
            m.photos.push(dataUrl);
            if(!m.avatarDataUrl) m.avatarDataUrl = dataUrl;
            render();
          });
        });
      });
      document.querySelectorAll('[data-prm-member]').forEach(function(btn){
        btn.addEventListener('click', function(e){
          e.stopPropagation();
          var mIdx = parseInt(btn.getAttribute('data-prm-member'),10);
          var pIdx = parseInt(btn.getAttribute('data-prm-idx'),10);
          var m = state.members[mIdx];
          if(m){
            m.photos.splice(pIdx,1);
            m.avatarDataUrl = m.photos[0] || null;
          }
          render();
        });
      });

      document.querySelectorAll('[data-member-name]').forEach(function(input){
        input.addEventListener('input', function(e){
          var idx = parseInt(input.getAttribute('data-member-name'),10);
          if(state.members[idx]) state.members[idx].name = e.target.value;
        });
      });
      document.querySelectorAll('[data-member-pos]').forEach(function(sel){
        sel.addEventListener('change', function(){
          var idx = parseInt(sel.getAttribute('data-member-pos'),10);
          onMemberPositionChange(idx, sel.value);
          render();
        });
      });
      document.querySelectorAll('[data-remove-member]').forEach(function(btn){
        btn.addEventListener('click', function(){
          var idx = parseInt(btn.getAttribute('data-remove-member'),10);
          removeMember(idx);
          render();
        });
      });
      var addMemberBtnEl = document.getElementById('btn-add-member');
      if(addMemberBtnEl) addMemberBtnEl.addEventListener('click', function(){ addMember(); render(); });
    }

    if(state.viewingMemberName){
      var mpBack = document.getElementById('btn-memberprofile-back');
      if(mpBack) mpBack.addEventListener('click', function(){ state.viewingMemberName = null; render(); });
    }
    if(state.viewingPostId){
      var pdBack = document.getElementById('btn-postdetail-back');
      if(pdBack) pdBack.addEventListener('click', function(){ state.viewingPostId = null; render(); });
    }
    if(state.editingProfile){ bindProfileEditOverlay(); }
    if(state.settingGoal){
      var goalCloseBtn = document.getElementById('btn-goal-close');
      if(goalCloseBtn) goalCloseBtn.addEventListener('click', function(){ state.settingGoal=false; render(); });
      document.querySelectorAll('[data-goal-type]').forEach(function(card){
        card.addEventListener('click', function(){
          startGoal(card.getAttribute('data-goal-type'));
          state.settingGoal = false;
          render();
        });
      });
    }
    if(state.viewingStats){
      var statsCloseBtn = document.getElementById('btn-stats-close');
      if(statsCloseBtn) statsCloseBtn.addEventListener('click', function(){ state.viewingStats=false; render(); });
    }

    var dmOpenBtn = document.getElementById('btn-open-dms');
    if(dmOpenBtn) dmOpenBtn.addEventListener('click', function(){ state.viewingDMList = true; render(); });

    if(state.viewingDMList){
      var dmListClose = document.getElementById('btn-dmlist-close');
      if(dmListClose) dmListClose.addEventListener('click', function(){ state.viewingDMList=false; render(); });
      document.querySelectorAll('[data-open-dm]').forEach(function(row){
        row.addEventListener('click', function(){
          var conv = findDM(row.getAttribute('data-open-dm'));
          if(conv) conv.unread = false;

  /* ---- comment / post actions ---- */
  function handleCommentAction(btn){
    var action = btn.getAttribute('data-action');
    var postId = btn.getAttribute('data-post');
    var post = findPost(postId);
    if(!post) return;

    if(action==='pin-profile'){
      togglePinToProfile(post);
      render();
      return;
    }
    if(action==='toggle-post-like'){
      post.liked = !post.liked;
      post.likes += post.liked ? 1 : -1;
      if(post.likes<0) post.likes = 0;
      render();
      return;
    }
    if(action==='toggle-save'){
      post.saved = !post.saved;
      render();
      return;
    }
    if(action==='toggle-comments'){
      toggleCommentsOpen(post);
      return;
    }

    var commentId = btn.getAttribute('data-comment');
    var comment = post.comments.filter(function(c){ return c.id===commentId; })[0];

    if(action==='like-comment'){
      if(!comment) return;
      comment.liked = !comment.liked;
      comment.likes = (comment.likes||0) + (comment.liked ? 1 : -1);
      if(comment.likes<0) comment.likes = 0;
      render();
    } else if(action==='pin'){
      post.pinnedCommentId = post.pinnedCommentId===commentId ? null : commentId;
      render();
    } else if(action==='delete'){
      post.comments = post.comments.filter(function(c){ return c.id!==commentId; });
      if(post.pinnedCommentId===commentId) post.pinnedCommentId=null;
      render();
    } else if(action==='reply'){
      state.replyOpenCommentId = state.replyOpenCommentId===commentId ? null : commentId;
      state.replyDraft = '';
      render();
      var input = document.getElementById('reply-input-'+commentId);
      if(input){
        input.focus();
        input.addEventListener('input', function(e){ state.replyDraft = e.target.value; });
      }
    } else if(action==='send-reply'){
      var text = (state.replyDraft||'').trim();
      if(!text) return;
      post.comments.push(makeComment(state.name, text, {isReply:true, likes:0}));
      state.replyOpenCommentId = null; state.replyDraft='';
      render();
    }
  }

  function requestAIComments(post){
    try{
      var match = /^data:(image\/[a-zA-Z0-9.+-]+);base64,(.*)$/.exec(post.photo.dataUrl);
      if(!match){ return; }
      var mediaType = match[1], base64Data = match[2];
      var prompt = "あなたはK-POPファンダムのSNSコメント欄をシミュレートします。これは、アイドル「"+post.name+"」（グループ:"+state.groupName+"、ポジション:"+post.position+"）が投稿した写真とキャプションです。キャプション:「"+post.caption+"」\n\n" +
        "この写真の内容をよく見て、今風の日本語K-POPファンが書きそうなコメントを12件、JSON配列のみで出力してください。写真に写っているものに合わせて反応の種類を変えてください（例: 料理が写っていたら「美味しそう」「これ何食べてるの?」、景色なら「景色いい」「どこ?」、ペットや動物なら「かわいい動物も好き」、本人の見た目が中心なら外見への反応、など、内容に応じて自然に）。半分程度は「かわいい😍」「いいね!」「尊い」のような短く自然な反応（絵文字だけの短いものも含めてOK）、残り半分はもう少し具体的な感想にしてください。各要素は次の形式にしてください: {\"user\":\"英数字と_のみのSNSユーザー名（日本語不可）\",\"text\":\"コメント本文。絵文字を適度に含め、カジュアルな日本語で、写真に実際に写っている内容に触れるものも混ぜること\"}。JSON配列以外の文字（説明文やコードブロック記号）は絶対に出力しないでください。";

      fetch("https://api.anthropic.com/v1/messages", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
          model:"claude-sonnet-4-6",
          max_tokens:1600,
          messages:[{ role:"user", content:[
            {type:"image", source:{type:"base64", media_type:mediaType, data:base64Data}},
            {type:"text", text:prompt}
          ]}]
        })
      }).then(function(r){ return r.json(); })
      .then(function(data){
        var textBlock = (data.content||[]).map(function(b){ return b.text || ''; }).join('\n');
        var cleaned = textBlock.replace(/```json|```/g,'').trim();
        var arr = JSON.parse(cleaned);
        if(Array.isArray(arr) && arr.length>0){
          post.aiComments = arr.filter(function(x){ return x && x.user && x.text; });
        }
      }).catch(function(){});
    }catch(e){}
  }

  function requestAICaption(dataUrl, name, groupName, position){
    return new Promise(function(resolve){
      try{
        var match = /^data:(image\/[a-zA-Z0-9.+-]+);base64,(.*)$/.exec(dataUrl);
        if(!match){ resolve(null); return; }
        var mediaType = match[1], base64Data = match[2];
        var prompt = "あなたはK-POPアイドル「"+name+"」（グループ:"+groupName+"、ポジション:"+position+"）本人としてSNSに投稿するキャプションを1つだけ考えます。この写真に実際に写っているもの（衣装や私服、食べ物、景色、場所、表情など）をよく見て、それに合った今風でカジュアルな日本語のキャプションを1つ、絵文字を適度に含めて40文字以内で書いてください。写真の内容が食べ物なら味の感想、景色なら場所の様子、服装なら今日のスタイルについてなど、内容に応じて自然な切り口にしてください。ハッシュタグは1つまで。説明文やカギ括弧、前置きは一切付けず、キャプション本文だけを出力してください。";
        fetch("https://api.anthropic.com/v1/messages", {
          method:"POST",
          headers:{"Content-Type":"application/json"},
          body: JSON.stringify({
            model:"claude-sonnet-4-6",
            max_tokens:200,
            messages:[{ role:"user", content:[
              {type:"image", source:{type:"base64", media_type:mediaType, data:base64Data}},
              {type:"text", text:prompt}
            ]}]
          })
        }).then(function(r){ return r.json(); })
        .then(function(data){
          var textBlock = (data.content||[]).map(function(b){ return b.text || ''; }).join('\n').trim();
          var cleaned = textBlock.replace(/^["「]|["」]$/g,'').trim();
          resolve(cleaned || null);
        }).catch(function(){ resolve(null); });
      }catch(e){ resolve(null); }
    });
  }

  function patchPost(post, newComments){
    var likesEl = document.getElementById('likes-'+post.id);
    if(likesEl) likesEl.textContent = post.likes.toLocaleString()+'件のいいね';
    var toggleEl = document.getElementById('ctoggle-'+post.id);

      if(prevEl){ prevEl.innerHTML = '<b>'+esc(latest.user)+'</b>'+esc(latest.text); }
    }
    var commentsWrap = document.getElementById('comments-'+post.id);
    if(commentsWrap && newComments && newComments.length){

  function scheduleEngagement(postId){
    var waves = [500, 1000, 1600, 2400, 3400, 4600, 6000, 7600, 9500, 11800, 14500, 17800, 21500, 26000, 31000, 37000, 44000, 52000];
    waves.forEach(function(delay, i){
      setTimeout(function(){
        var post = findPost(postId);
        if(!post) return;
        var likeBump = Math.max(8, Math.floor((80 - i*3) + Math.random()*140));
        post.likes += likeBump;

        var newComments = [];
        var commentChance = Math.max(0.5, 0.97 - i*0.03);
        var burst = 1;
        var r = Math.random();
        if(r < 0.15) burst = 3; else if(r < 0.4) burst = 2;
        for(var k=0;k<burst;k++){
          if(Math.random() < commentChance){
            var user, text, isAi=false;
            if(post.aiComments && post.aiComments.length>0){
              var picked = post.aiComments.shift();
              user = picked.user; text = picked.text; isAi = true;
            } else {
              user = pick(FAN_NAMES); text = getRealisticComment(post.name);
            }
            var nc = makeComment(user, text, {ai:isAi});
            post.comments.unshift(nc);
            newComments.push(nc);
            state.notifications.unshift({ icon:'💬', time:nowLabel(), html: '<b>'+esc(user)+'</b> があなたの投稿にコメントしました:「'+esc(text)+'」' });
            if(state.activeTab !== 'notif'){ state.unreadNotif++; }
          }
        }
        state.followers += Math.max(2, 18 - i*1) + Math.floor(Math.random()*15);

        if(Math.random() < 0.1){ spawnRandomDM(); patchDMBadge(); }

        patchPost(post, newComments);
        patchFollowerCount();
        patchUnreadBadges();
      }, delay);
    });
  }

  function advanceTime(){
    var member = pick(state.members);
    var mood = pick(MOODS.filter(function(m){return m.id!=='live';}));
    var caption = pickCaptionForMood(mood.id);
    var initialLikes = 300 + Math.floor(Math.random()*900);
    var photo = (member.photos && member.photos.length>0) ? {type:'upload', dataUrl: pick(member.photos)} : {type:'template', moodId: mood.id};
    var initialComments = [];
    var numComments = 4 + Math.floor(Math.random()*4);
    for(var i=0;i<numComments;i++){ initialComments.push(makeComment(pick(FAN_NAMES), getRealisticComment(member.name))); }
    var post = {
      id: Date.now()+Math.random(),
      name: member.name, position: member.position, color: member.color, avatarDataUrl: member.avatarDataUrl,
      photo: photo, filter:null,
      caption: caption, time: nowLabel(), likes: initialLikes,
      comments: initialComments,
      isMine:false, aiComments:null, pinnedCommentId:null, pinnedToProfile:false, pinnedAt:null, liked:false, saved:false
    };
    state.posts.unshift(post);
    if(photo.type==='upload'){
      post.aiComments = [];
      requestAIComments(post);
      requestAICaption(photo.dataUrl, member.name, state.groupName, member.position).then(function(aiCaption){
        if(aiCaption){
          post.caption = aiCaption;
          patchCaption(post);
        }
      });
    }

    var myPosts = state.posts.filter(function(p){ return p.isMine; });
    if(myPosts.length>0 && Math.random()<0.7){
      var target = myPosts[0];
      var fan = pick(FAN_NAMES);
      target.comments.unshift(makeComment(fan, getRealisticComment(state.name), {likes:0}));
      target.likes += 20 + Math.floor(Math.random()*80);
    }

    var newFollower = pick(FAN_NAMES);
    state.notifications.unshift({ icon:'⭐', time:nowLabel(), html: '<b>'+esc(newFollower)+'</b> があなたをフォローしました' });
    state.notifications.unshift({ icon:'📣', time:nowLabel(), html: '<b>'+esc(member.name)+'</b>（'+esc(member.position)+'）が新しい投稿をしました' });
    if(state.activeTab !== 'notif'){ state.unreadNotif += 2; }

    if(Math.random() < 0.4){ spawnRandomDM(); }

    state.followers += 60 + Math.floor(Math.random()*200);
    render();
  }

  /* ---------------- LIVE STREAM ---------------- */

    if(postSsBtn) postSsBtn.addEventListener('click', function(){
      var img = state.liveCapturedFrame ? {type:'upload', dataUrl: state.liveCapturedFrame} : {type:'template', moodId:'live'};
      state.composerImage = img;
      state.composerText = '今日の配信、来てくれてありがとう🎥💗 #配信 #供給';

  function attachCameraToVideo(forceRetry){
    var videoEl = document.getElementById('live-video');
    var noCamEl = document.getElementById('live-noCam');
    if(!videoEl) return;
    if(cameraStream && !forceRetry){
      videoEl.srcObject = cameraStream;
      if(noCamEl) noCamEl.style.display = 'none';
      return;
    }
    if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
      state.liveCamDenied = true; state.liveCamErrorType = 'unsupported';
      if(noCamEl){ noCamEl.style.display = 'flex'; }
      return;
    }
    navigator.mediaDevices.getUserMedia({video:true, audio:false}).then(function(stream){
      cameraStream = stream;
      state.liveCamDenied = false; state.liveCamErrorType = null;
      var v = document.getElementById('live-video');
      var nc = document.getElementById('live-noCam');
      if(v){ v.srcObject = stream; }
      if(nc){ nc.style.display = 'none'; }
    }).catch(function(err){
      state.liveCamDenied = true;
      state.liveCamErrorType = (err && err.name) || 'unknown';
      render();
    });
  }

  function startLive(){
    state.liveActive = true;
    state.liveStartTime = Date.now();
    state.liveViewers = 600 + Math.floor(Math.random()*1800);
    state.liveComments = [];
    state.liveSummary = null;
    render();

    var timerInterval = setInterval(function(){
      if(!state.liveActive) return;
      var elapsed = Math.floor((Date.now()-state.liveStartTime)/1000);
      var mm = String(Math.floor(elapsed/60)).padStart(2,'0');
      var ss = String(elapsed%60).padStart(2,'0');
      var t = document.getElementById('live-timer');
      if(t) t.textContent = mm+':'+ss;
    }, 1000);

    var viewerInterval = setInterval(function(){
      if(!state.liveActive) return;
      state.liveViewers += 15 + Math.floor(Math.random()*120);
      var vc = document.getElementById('live-viewer-count');
      if(vc) vc.textContent = fmtFollowers(state.liveViewers);
    }, 2200);

    var commentInterval = setInterval(function(){
      if(!state.liveActive) return;
      var roll = Math.random();
      if(roll < 0.14){
        var member = pick(state.members);
        var msg = { user: member.name+'（メンバー）', text: '配信きたー!みんな見てくれてありがとう💜' };
        state.liveComments.push(msg);
        appendLiveComment(msg, true);
      } else if(roll < 0.28){
        var gift = pick(GIFTS);
        var fan = pick(FAN_NAMES);
        showGiftToast(fan, gift);
        state.liveViewers += 5;
      } else {
        var msg2 = { user: pick(FAN_NAMES), text: pick(LIVE_COMMENTS) };
        state.liveComments.push(msg2);
        appendLiveComment(msg2, false);
      }
    }, 1000);

    liveTimers = [timerInterval, viewerInterval, commentInterval];
  }

  function appendLiveComment(msg, highlight){

  function showGiftToast(fan, gift){
    var stage = document.getElementById('live-stage');
    if(!stage) return;
    var toast = document.createElement('div');
    toast.className = 'live-gift-toast';
    toast.textContent = gift.icon+' '+fan+' が「'+gift.name+'」を送りました！';

  function captureFrame(){
    var videoEl = document.getElementById('live-video');
    if(!videoEl || !cameraStream || !videoEl.videoWidth){ return null; }
    try{
      var canvas = document.getElementById('hidden-canvas');
      canvas.width = videoEl.videoWidth; canvas.height = videoEl.videoHeight;
      var ctx = canvas.getContext('2d');
      ctx.translate(canvas.width,0); ctx.scale(-1,1);
      ctx.drawImage(videoEl, 0, 0, canvas.width, canvas.height);
      return canvas.toDataURL('image/jpeg', 0.85);
    }catch(e){ return null; }
  }

  function stopLive(){
    var frame = captureFrame();
    state.liveCapturedFrame = frame;

    liveTimers.forEach(function(t){ clearInterval(t); });
    liveTimers = [];
    if(cameraStream){
      cameraStream.getTracks().forEach(function(tr){ tr.stop(); });
      cameraStream = null;
    }

    var elapsed = Math.floor((Date.now()-state.liveStartTime)/1000);
    var mm = String(Math.floor(elapsed/60)).padStart(2,'0');
    var ss = String(elapsed%60).padStart(2,'0');
    var followersGained = 200 + Math.floor(state.liveViewers*0.08) + Math.floor(Math.random()*300);

    state.liveSummary = { peakViewers: state.liveViewers, duration: mm+':'+ss, followersGained: followersGained };
    state.followers += followersGained;
    state.liveActive = false;
    render();
  }

  rebuildTeammateDrafts();
  render();

  fbAuth.onAuthStateChanged(function(user){
    if(user){
      state.uid = user.uid;
      state.userDisplayName = user.displayName || '';
      state.authLoading = true;
      state.screen = 'loading';
      render();
      loadStateFromFirestore(user.uid).then(function(found){
        state.authLoading = false;
        if(!found){ state.screen = 'onboarding'; rebuildTeammateDrafts(); }
        render();
      });
    } else {
      state.uid = null;
      state.authLoading = false;
      state.screen = 'login';
      render();
    }
  });

  setInterval(function(){ if(state.screen==='app'){ saveState(); } }, 8000);
  window.addEventListener('beforeunload', function(){ if(state.screen==='app'){ saveState(); } });
})();
</script>
